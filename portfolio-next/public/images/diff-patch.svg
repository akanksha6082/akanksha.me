<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Terminal diff and patch">
  <defs>
    <linearGradient id="dp-bg" x1="0" y1="0" x2="320" y2="200">
      <stop offset="0%" stop-color="#05080d"/>
      <stop offset="100%" stop-color="#0a0e16"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dp-bg)"/>
  <!-- terminal window -->
  <rect x="36" y="36" width="248" height="128" rx="10" fill="#080c12" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="36" y="36" width="248" height="28" rx="10" fill="#0f141c"/>
  <rect x="36" y="56" width="248" height="8" fill="#0f141c"/>
  <circle cx="52" cy="50" r="4" fill="#475569"/>
  <circle cx="68" cy="50" r="4" fill="#64748b"/>
  <circle cx="84" cy="50" r="4" fill="#94a3b8"/>
  <text x="110" y="54" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">bash</text>
  <text x="52" y="84" fill="#22d3ee" font-family="ui-monospace,monospace" font-size="11" font-weight="600">$</text>
  <text x="68" y="84" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">diff -u old.txt new.txt</text>
  <text x="52" y="104" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">--- old.txt</text>
  <text x="52" y="122" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">+++ new.txt</text>
  <text x="52" y="142" fill="#f87171" font-family="ui-monospace,monospace" font-size="10">- line removed</text>
  <text x="52" y="158" fill="#22d3ee" font-family="ui-monospace,monospace" font-size="10">+ line added</text>
</svg>
