  <rect x="128" y="104" width="64" height="26" rx="5" fill="#14101c" fill-opacity="0.9" stroke="url(#neo-accent)" stroke-width="1"/>
  <rect x="218" y="68" width="64" height="26" rx="5" fill="#14101c" fill-opacity="0.9" stroke="url(#neo-accent)" stroke-width="1"/>
  <rect x="218" y="104" width="64" height="26" rx="5" fill="#14101c" fill-opacity="0.9" stroke="url(#neo-accent)" stroke-width="1"/>
  <g opacity="0.9">
