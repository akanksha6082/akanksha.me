<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Neo project management preview">
  <defs>
    <linearGradient id="neo-bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#050c12"/>
      <stop offset="45%" stop-color="#070810"/>
      <stop offset="100%" stop-color="#0c0818"/>
    </linearGradient>
    <linearGradient id="neo-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="neo-vignette" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="35%" stop-color="#581c87" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#581c87" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="neo-glow-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.75"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1e1033" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neo-glow-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neo-glow-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#050c12" stop-opacity="0"/>
    </radialGradient>
    <filter id="neo-blur" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
    </filter>
  </defs>
  <rect width="320" height="200" fill="url(#neo-bg)"/>
  <g filter="url(#neo-blur)" opacity="0.95">
