  <rect width="320" height="200" fill="url(#neo-vignette)"/>
  <rect x="28" y="36" width="84" height="128" rx="8" fill="#0d0a12" fill-opacity="0.72" stroke="url(#neo-accent)" stroke-opacity="0.38" stroke-width="1.25"/>
